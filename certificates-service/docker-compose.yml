version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: certificates_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-certificates_db}
      POSTGRES_USER: ${POSTGRES_USER:-certuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-certpass123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/alembic/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-certuser} -d ${POSTGRES_DB:-certificates_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - certificates_net

  redis:
    image: redis:7-alpine
    container_name: certificates_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - certificates_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: certificates_backend
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-certuser}:${POSTGRES_PASSWORD:-certpass123}@postgres:5432/${POSTGRES_DB:-certificates_db}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-certuser}:${POSTGRES_PASSWORD:-certpass123}@postgres:5432/${POSTGRES_DB:-certificates_db}
      # Redis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-32-chars-minimum-secret-key}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      # Upload
      UPLOAD_DIR: /app/uploads
      PREVIEW_DIR: /app/uploads/previews
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
      # App
      DEBUG: ${DEBUG:-false}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:80}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - certificates_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: certificates_worker
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-certuser}:${POSTGRES_PASSWORD:-certpass123}@postgres:5432/${POSTGRES_DB:-certificates_db}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-certuser}:${POSTGRES_PASSWORD:-certpass123}@postgres:5432/${POSTGRES_DB:-certificates_db}
      # Redis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-32-chars-minimum-secret-key}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      # Upload
      UPLOAD_DIR: /app/uploads
      PREVIEW_DIR: /app/uploads/previews
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
      # App
      DEBUG: ${DEBUG:-false}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info -Q certificates,previews,default -c 4
    networks:
      - certificates_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: certificates_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://nginx/api
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - certificates_net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: certificates_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - uploads_data:/app/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - certificates_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  certificates_net:
    driver: bridge
