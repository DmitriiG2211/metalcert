databases:
  - name: metalcert-db
    databaseName: certificates_db
    user: certuser
    plan: free

services:
  - type: web
    name: metalcert-api
    runtime: python
    plan: free
    rootDir: certificates-service/backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: metalcert-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: metalcert-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://metalcert-web.onrender.com"]'
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: PREVIEW_DIR
        value: /tmp/uploads/previews
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: CELERY_BROKER_URL
        value: redis://localhost:6379/1
      - key: CELERY_RESULT_BACKEND
        value: redis://localhost:6379/2
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

  - type: web
    name: metalcert-web
    runtime: node
    plan: free
    rootDir: certificates-service/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://metalcert-api.onrender.com
      - key: NODE_VERSION
        value: "20"
